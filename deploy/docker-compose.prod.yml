services:
  api:
    image: ${IMAGE_NAME:-docker-compose-todo:latest}
    container_name: todo-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/todoapp}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: todo-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
