services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.6
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro

  acme-companion:
    image: nginxproxy/acme-companion:2.5
    container_name: nginx-proxy-acme
    restart: unless-stopped
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL}
      NGINX_PROXY_CONTAINER: nginx-proxy
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - nginx-proxy

  api-blue:
    image: ${BLUE_IMAGE_NAME:-${IMAGE_NAME:-docker-compose-todo:latest}}
    container_name: todo-api-blue
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/todoapp}
      VIRTUAL_HOST: ${BLUE_VIRTUAL_HOST:-}
      VIRTUAL_PORT: 3000
      LETSENCRYPT_HOST: ${BLUE_LETSENCRYPT_HOST:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
    expose:
      - "3000"
    depends_on:
      - mongo

  api-green:
    image: ${GREEN_IMAGE_NAME:-${IMAGE_NAME:-docker-compose-todo:latest}}
    container_name: todo-api-green
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/todoapp}
      VIRTUAL_HOST: ${GREEN_VIRTUAL_HOST:-}
      VIRTUAL_PORT: 3000
      LETSENCRYPT_HOST: ${GREEN_LETSENCRYPT_HOST:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
    expose:
      - "3000"
    depends_on:
      - mongo

  mongo:
    image: mongo:4.4.29
    container_name: todo-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  certs:
  vhost:
  html:
  acme:
