name: Build and Deploy Docker Compose

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_DIR: /opt/todo-api
  IMAGE_REPO: ${{ secrets.DOCKER_USERNAME }}/docker-compose-todo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare app directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          script: |
            set -e
            mkdir -p ${{ env.APP_DIR }}

      - name: Upload production Docker Compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          source: "deploy/docker-compose.prod.yml"
          target: "${{ env.APP_DIR }}"
          strip_components: 1

      - name: Deploy on VPS with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}

            cat > .env <<'EOF'
            NODE_ENV=production
            MONGO_URI=mongodb://mongo:27017/todoapp
            DOMAIN=${{ secrets.DOMAIN }}
            LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}
            EOF

            # CI/CD luôn deploy đúng image vừa build.
            printf '\nIMAGE_NAME=%s\n' '${{ env.IMAGE_REPO }}:${{ github.sha }}' >> .env

            for i in 1 2 3 4 5; do
              docker compose -f docker-compose.prod.yml pull && break
              echo "docker compose pull failed, retry $i/5..."
              sleep 10
            done

            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
