name: Build and Blue-Green Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_DIR: /opt/todo-api
  IMAGE_REPO: ${{ secrets.DOCKER_USERNAME }}/docker-compose-todo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare app directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          script: |
            set -e
            mkdir -p ${{ env.APP_DIR }}

      - name: Upload production files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          source: "deploy/docker-compose.prod.yml,scripts/blue-green-deploy.sh,scripts/blue-green-rollback.sh"
          target: "${{ env.APP_DIR }}"
          strip_components: 1

      - name: Blue-green deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}
            chmod +x blue-green-deploy.sh blue-green-rollback.sh
            APP_DIR=${{ env.APP_DIR }} \
            NEW_IMAGE='${{ env.IMAGE_REPO }}:${{ github.sha }}' \
            DOMAIN='${{ secrets.DOMAIN }}' \
            LETSENCRYPT_EMAIL='${{ secrets.LETSENCRYPT_EMAIL }}' \
            MONGO_URI='mongodb://mongo:27017/todoapp' \
            ./blue-green-deploy.sh
            docker image prune -f
