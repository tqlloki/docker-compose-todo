services:
  api:
    build:
      context: .
    image: ${IMAGE_NAME:-docker-compose-todo:local}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/todoapp}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --host 127.0.0.1 --port 27017 --quiet --eval 'db.adminCommand({ ping: 1 }).ok' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

volumes:
  mongo_data:
